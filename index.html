<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToDo List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 인증 폼 (미로그인 상태) -->
  <div id="auth-section">
    <div class="auth-card">
      <h1>ToDo List</h1>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-signin">로그인</button>
        <button class="auth-tab" id="tab-signup">회원가입</button>
      </div>

      <!-- 로그인 폼 -->
      <div id="form-signin">
        <input type="email" id="signin-email" class="auth-input" placeholder="이메일" />
        <input type="password" id="signin-password" class="auth-input" placeholder="비밀번호" />
        <button class="auth-btn" id="signinBtn">로그인</button>
        <p class="auth-error" id="signin-error"></p>
        <div class="social-divider"><span>또는</span></div>
        <button class="social-btn social-btn--github" id="githubBtn">GitHub으로 로그인</button>
        <button class="social-btn social-btn--google" id="googleBtn">Google로 로그인</button>
      </div>

      <!-- 회원가입 폼 -->
      <div id="form-signup" hidden>
        <input type="email" id="signup-email" class="auth-input" placeholder="이메일" />
        <input type="password" id="signup-password" class="auth-input" placeholder="비밀번호 (6자 이상)" />
        <button class="auth-btn" id="signupBtn">회원가입</button>
        <p class="auth-error" id="signup-error"></p>
      </div>

      <!-- 인증 이메일 발송 안내 -->
      <div id="email-sent" hidden>
        <p class="auth-notice">
          인증 이메일을 전송했습니다.<br />
          메일함을 확인하고 링크를 클릭해 주세요.
        </p>
      </div>
    </div>
  </div>

  <!-- 칸반 앱 (로그인 상태) -->
  <div id="app-section" hidden>
    <div class="page">
      <header class="page-header">
        <h1>ToDo List</h1>
        <div class="user-bar">
          <span id="user-email" class="user-email"></span>
          <button id="shareBtn" class="share-btn">공유</button>
          <button id="signoutBtn" class="signout-btn">로그아웃</button>
        </div>
        <div class="input-row">
          <input type="text" id="todoInput" placeholder="할 일을 입력하세요" maxlength="100" />
          <button id="addBtn">+ 추가</button>
          <span id="share-badge" hidden class="share-badge"></span>
        </div>
      </header>

      <div class="kanban">

        <!-- 예정 -->
        <div class="column column--todo" data-status="todo">
          <div class="col-header">
            <span class="col-title">예정</span>
            <span class="col-count" id="count-todo">0</span>
          </div>
          <div class="card-list" id="list-todo"
            data-status="todo"
            ondragover="onDragOver(event)"
            ondragleave="onDragLeave(event)"
            ondrop="onDrop(event)">
          </div>
        </div>

        <!-- 진행중 -->
        <div class="column column--inprogress" data-status="inprogress">
          <div class="col-header">
            <span class="col-title">진행중</span>
            <span class="col-count" id="count-inprogress">0</span>
          </div>
          <div class="card-list" id="list-inprogress"
            data-status="inprogress"
            ondragover="onDragOver(event)"
            ondragleave="onDragLeave(event)"
            ondrop="onDrop(event)">
          </div>
        </div>

        <!-- 완료 -->
        <div class="column column--done" data-status="done">
          <div class="col-header">
            <span class="col-title">완료</span>
            <span class="col-count" id="count-done">0</span>
          </div>
          <div class="card-list" id="list-done"
            data-status="done"
            ondragover="onDragOver(event)"
            ondragleave="onDragLeave(event)"
            ondrop="onDrop(event)">
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- 공유 modal -->
  <div id="share-modal" class="modal-overlay" hidden>
    <div class="modal-card">
      <h2>보드 공유</h2>
      <div class="share-toggle-row">
        <span>공유 활성화</span>
        <label class="toggle-switch">
          <input type="checkbox" id="shareToggle" />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div id="share-options" hidden>
        <div class="share-perm-row">
          <label><input type="radio" name="perm" value="readonly" checked /> 읽기 전용</label>
          <label><input type="radio" name="perm" value="edit" /> 편집 가능</label>
        </div>
        <div class="share-link-row">
          <input type="text" id="shareLinkInput" readonly />
          <button id="copyLinkBtn">복사</button>
        </div>
      </div>
      <button id="closeShareModal" class="modal-close">닫기</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
